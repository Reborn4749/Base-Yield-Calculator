<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Base Yield App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Base Yield Calculator 🔵</h1>
    <p>คำนวณผลตอบแทน APY ที่ 10% สำหรับเหรียญ USDC</p>
    <select id="tokenType">
        <option value="USDC">USDC (APY 10%)</option>
        <option value="cbBTC">cbBTC (APY 5%)</option>
    </select>
    <input type="number" id="usdcAmount" placeholder="ใส่จำนวน USDC">
    <input type="number" id="stakingDays" placeholder="ฝากกี่วัน? (เช่น 30)">
  <button id="calcBtn">คำนวณ Yield</button>
    <button id="resetBtn" style="background-color: #6c757d;">ล้างข้อมูล</button>
    <p>ผลตอบแทนต่อปี: <span id="yieldResult">0</span> USDC</p>
    <script src="script.js"></script>
</body>
</html>
